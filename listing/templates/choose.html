<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choosing Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        /* ── page title ── */
        .page-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title h2 {
            font-size: 1rem;
            color: rgba(0, 0, 0, 0.55);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .page-title h1 {
            font-size: 3rem;
            color: #000;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .page-title .divider {
            width: 80px;
            height: 3px;
            background-color: #000;
            margin: 12px auto 0;
            border-radius: 2px;
        }

        /* ── card wrapper ── */
        .split-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        /* ── shared card style ── */
        .btn-split {
            width: 300px;
            height: 380px;
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 28px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* ── LEFT card — Room ── */
        .left-room {
            background-color: #ffefdb;
            border: 2px solid #e5c9a0;
            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.08);
        }

        .right-unit {
            background-color: #ffefdb;
            border: 2px solid #e5c9a0;
            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.08);
        }

        .left-room:hover {
            transform: translateY(-8px);
            box-shadow: 10px 14px 30px rgba(0, 0, 0, 0.15);
        }

        .right-unit:hover {
            transform: translateY(-8px);
            box-shadow: 10px 14px 30px rgba(0, 0, 0, 0.15);
        }


        /* ── icon ── */
        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 18px;
        }

        /* ── text inside cards ── */
        .sub-text {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            line-height: 1;
        }

        .want-text {
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.5;
        }

        .description {
            font-size: 0.82rem;
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        /* Left card (米色底) 文字用黑色 */
        .left-room .sub-text { color: rgba(0, 0, 0, 0.55); }
        .left-room .card-title { color: #000; }
        .left-room .want-text { color: #000; }
        .left-room .description { color: rgba(0, 0, 0, 0.6); }

        /* Right card 文字也用黑色 */
        .right-unit .sub-text { color: rgba(0, 0, 0, 0.55); }
        .right-unit .card-title { color: #000; }
        .right-unit .want-text { color: #000; }
        .right-unit .description { color: rgba(0, 0, 0, 0.6); }


        /* ── bottom tag ── */
        .card-tag {
            margin-top: 24px;
            padding: 8px 22px;
            border-radius: 999px;
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .left-room .card-tag {
            color: #fff;
            background-color: #000;
        }

        .right-unit .card-tag {
            color: #fff;
            background-color: #000;
        }

        /* ── My Applications button ── */
        .btn-applications {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 12px 32px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn-applications:hover {
            background: #b4b4b4;
        }

        /* ── responsive ── */
        @media (max-width: 680px) {
            .btn-split {
                width: 85vw;
                height: auto;
                min-height: 300px;
            }

            .page-title h1 {
                font-size: 2rem;
            }
        }
    </style>

    <button
    type="button"
    onclick="window.history.back()"
    style="
        position: fixed;
        top: 12px;
        right: 12px;
        border: none;
        background: #000;
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        font-weight: bold;
        cursor: pointer;
        z-index: 9999;
    "
    aria-label="Close">
    ×
    </button>

</head>

<body>
  <div class="text-center w-100">

    <!-- Page heading -->
    <div class="page-title">
      <h2>Welcome to</h2>
      <h1>Budget Buddy</h1>
      <div class="divider"></div>
    </div>

    <!-- Two cards -->
    <div class="split-container">

      <!-- ROOM card -->
      <a href="{% url 'room_list' %}" class="btn-split left-room">
        <div class="card-icon">🛏️</div>
        <div class="sub-text">Looking for a</div>
        <div class="card-title">ROOM</div>
        <div class="want-text">You wanna rent<br>a <strong>Room</strong>?</div>
        <div class="description">A single cozy space<br>in a shared house.</div>
        <div class="card-tag">Explore Rooms →</div>
      </a>

      <!-- UNIT card -->
      <a href="{% url 'unit_list' %}" class="btn-split right-unit">
        <div class="card-icon">🏠</div>
        <div class="sub-text">Looking for a</div>
        <div class="card-title">UNIT</div>
        <div class="want-text">You wanna rent<br>a <strong>Unit</strong>?</div>
        <div class="description">An entire apartment<br>or house, all yours.</div>
        <div class="card-tag">Explore Units →</div>
      </a>

    </div>

    <!-- My Requests button -->
    <div class="mt-4">
      <a href="{% url 'my_room_requests' %}">
        <button class="btn-applications">
          My Applications
        </button>
      </a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
