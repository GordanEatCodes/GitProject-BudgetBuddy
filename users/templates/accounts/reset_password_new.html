{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    
    <link rel="apple-touch-icon" sizes="180x180" href= "{% static "images/apple-touch-icon.png" %}"/>
    <link rel="icon" type="image/png" sizes="32x32" href=" {% static "images/favicon-32x32.png" %}"/>
    <link rel="icon" type="image/png" sizes="16x16" href=" {% static "images/favicon-16x16.png" %}"/>  
    
    <link rel="manifest" href=" {% static "images/site.webmanifest" %}" />
    <link rel="stylesheet" href="{% static 'css/base.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/login.css' %}"/>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-name">BudgetBuddy</div>
        <div class="brand-tag">Define your budget, simplify your life</div>
    </div>

    <div class="card">
        <div class="card-header">Set New Password</div>
        <div class="card-sub">Choose a strong password for your account.</div>

        {% if form.non_field_errors %}
            <div class="error">{{ form.non_field_errors }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

        <div class="field">
            <div class="pw-wrap">
                <input type="password" name="new_password1" placeholder="New password" required />
                <button type="button" class="pw-toggle" id="newPwToggle">show</button>
            </div>
        </div>

        <div class="field">
            <div class="pw-wrap">
                <input type="password" name="new_password2" placeholder="Confirm new password" required />
                <button type="button" class="pw-toggle" id="confirmPwToggle">show</button>
            </div>
        </div>
        <button type="submit" class="btn-primary">Update Password</button>
    </form>
    </div>
</div>

<script>
    const newPwToggle = document.getElementById('newPwToggle');
    const confirmPwToggle = document.getElementById('confirmPwToggle');

    newPwToggle.addEventListener('click', () => {
        const newPasswordInput = document.querySelector('input[name="new_password1"]');
        if (newPasswordInput.type === 'password') {
            newPasswordInput.type = 'text';
            newPwToggle.textContent = 'hide';
        } else {
            newPasswordInput.type = 'password';
            newPwToggle.textContent = 'show';
        }
    });

    confirmPwToggle.addEventListener('click', () => {
        const confirmPasswordInput = document.querySelector('input[name="new_password2"]');
        if (confirmPasswordInput.type === 'password') {
            confirmPasswordInput.type = 'text';
            confirmPwToggle.textContent = 'hide';
        } else {
            confirmPasswordInput.type = 'password';
            confirmPwToggle.textContent = 'show';
        }
    });
</script>
</body>
</html>
