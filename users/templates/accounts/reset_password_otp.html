{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter Reset Code</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{% static 'css/base.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/login.css' %}"/>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-name">BudgetBuddy</div>
        <div class="brand-tag">Define your budget, simplify your life</div>
    </div>

    <div class="card">
        <a href="{% url 'forgot_password' %}" class="card-exit" title="Back">&#x2715;</a>
        <div class="card-header">Check Your Email</div>
        <div class="card-sub">We sent a 6-digit code to <strong>{{ email }}</strong>.</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <input type="text" name="otp" placeholder="Enter 6-digit code"
                       maxlength="6" inputmode="numeric" autocomplete="one-time-code" required />
            </div>
            <button type="submit" class="btn-primary">Verify Code</button>
        </form>

        <div class="signup-link">
            Wrong email? <a href="{% url 'forgot_password' %}">Try again</a>
        </div>
    </div>
</div>
</body>
</html>
