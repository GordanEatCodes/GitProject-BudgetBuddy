<h1>Edit Roommate</h1>

<form method="POST">
    {% csrf_token %}

    <input name="title" value="{{ post.title }}"><br>
    <textarea name="description">{{ post.description }}</textarea><br>
    <input name="location" value="{{ post.location }}"><br>
    <input name="budget" value="{{ post.budget }}"><br>
    <input name="contact" value="{{ post.contact }}"><br>

    <button type="submit">Update</button>
</form>
