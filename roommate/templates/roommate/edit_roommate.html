{% extends 'base.html' %}

{% block content %}

<h2>Edit Roommate</h2>

<form method="POST" class="p-4 border rounded shadow-sm">
    {% csrf_token %}

    <input type="text" name="title" value="{{ post.title }}" class="form-control mb-2">
    <textarea name="description" class="form-control mb-2">{{ post.description }}</textarea>

    <input type="text" name="location" value="{{ post.location }}" class="form-control mb-2">
    <input type="number" name="budget" value="{{ post.budget }}" class="form-control mb-2">
    <input type="text" name="contact" value="{{ post.contact }}" class="form-control mb-2">

    <button type="submit" class="btn btn-primary">Update</button>
</form>

{% endblock %}
