{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow-sm">

    <h2>{{ post.title }}</h2>

    <p class="text-muted">
        Posted on: {{ post.created_at|date:"d M Y, h:i A" }}
    </p>

    <hr>

    <h5>Description</h5>
    <p>{{ post.description }}</p>

    <h5>Location</h5>
    <p>📍 {{ post.location }}</p>

    <h5>Budget</h5>
    <p>💰 RM {{ post.budget }}</p>

    <h5>Contact</h5>
    <p>📞 {{ post.contact }}</p>

    <div class="mt-3">
        <a href="{% url 'match_roommates' post.id %}" class="btn btn-info">
            Match
        </a>

        <a href="{% url 'edit_roommate' post.id %}" class="btn btn-warning">
            Edit
        </a>

        <a href="{% url 'delete_roommate' post.id %}" class="btn btn-danger">
            Delete
        </a>

        <a href="{% url 'roommate_list' %}" class="btn btn-secondary">
            Back
        </a>
    </div>

</div>

{% endblock %}
