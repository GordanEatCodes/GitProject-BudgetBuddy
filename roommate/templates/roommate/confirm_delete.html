{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow-sm">
    <h2>Confirm Delete</h2>

    <p>Are you sure you want to delete this roommate post?</p>

    <div class="border rounded p-3 mb-3 bg-light">
        <h4>{{ post.title }}</h4>
        <p>{{ post.description }}</p>
        <small>
            📍 {{ post.location }} | 💰 RM {{ post.budget }}
        </small>
    </div>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Yes, Delete
        </button>

        <a href="{% url 'roommate_list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>

{% endblock %}
