<h1>Roommate Posts</h1>

<a href="{% url 'add_roommate' %}">Add Roommate</a>

{% for post in posts %}
    <div>
        <h3>{{ post.title }}</h3>
        <p>{{ post.description }}</p>
        <p>Location: {{ post.location }}</p>
        <p>Budget: {{ post.budget }}</p>
        <p>Contact: {{ post.contact }}</p>

        <a href="{% url 'delete_roommate' post.id %}">Delete</a>
        <a href="{% url 'edit_roommate' post.id %}">Edit</a>

        <hr>
    </div>
{% endfor %}
