{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Budget Buddy</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        :root{
            --main-bg:#f7f3ed;
            --card-bg:#ffffff;
            --cream:#f3e6d3;
            --black:#111111;
            --text-muted:#6f6a63;
            --border-soft:#ded7ce;

            /* Status Colors */
            --open:#10b981;
            --full:#f59e0b;
            --closed:#ef4444;
        }

        html,
        body{
            height:100%;
            margin:0;
        }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            background:var(--main-bg);
            font-family:Arial, Helvetica, sans-serif;
            color:#111;
        }

        /* ---------- Navbar ---------- */

        .navbar{
            background:white !important;
            border-bottom:1px solid var(--border-soft);
            padding:18px 45px;
        }

        .logo-wrap img{
            object-fit:contain;
        }

        /* ---------- Page ---------- */

        .page-content{
            flex:1;
            margin-top:35px;
            margin-bottom:45px;
        }

        h1,h2,h3,h4{
            font-weight:700;
            color:#111;
        }

        /* ---------- Card ---------- */

        .card{
            background:white;
            border:1px solid var(--border-soft);
            border-radius:18px;
            box-shadow:0 4px 14px rgba(0,0,0,.05);
            transition:.25s;
        }

        .card:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 28px rgba(0,0,0,.08);
        }

        /* ---------- Form ---------- */

        .form-control{
            background:#fbfaf7;
            border:1px solid var(--border-soft);
            border-radius:10px;
            padding:12px;
        }

        .form-control:focus{
            border-color:#111;
            box-shadow:none;
        }

        /* ---------- Button ---------- */

        .btn{
            border-radius:10px;
            font-weight:600;
            transition:.2s;
        }

        .btn:hover{
            transform:translateY(-1px);
        }

        .btn-primary,
        .btn-success,
        .btn-info{
            background:#111 !important;
            border-color:#111 !important;
            color:white !important;
        }

        .btn-primary:hover,
        .btn-success:hover,
        .btn-info:hover{
            background:#333 !important;
            border-color:#333 !important;
        }

        .btn-warning{
            background:var(--cream) !important;
            border-color:var(--border-soft) !important;
            color:#111 !important;
        }

        .btn-secondary{
            background:white !important;
            border-color:var(--border-soft) !important;
            color:#111 !important;
        }

        .btn-danger{
            background:#dc3545 !important;
            border-color:#dc3545 !important;
            color:white !important;
        }

        /* ---------- Status Badges ---------- */

        .badge{
            padding:8px 14px;
            border-radius:999px;
            font-size:13px;
            font-weight:600;
            letter-spacing:.3px;
        }

        /* Open */

        .badge.bg-success{
            background:var(--open) !important;
            color:white !important;
        }

        /* Full */

        .badge.bg-warning{
            background:var(--full) !important;
            color:white !important;
        }

        /* Closed */

        .badge.bg-secondary{
            background:var(--closed) !important;
            color:white !important;
        }

        /* ---------- Text ---------- */

        .text-muted{
            color:var(--text-muted)!important;
        }

        small{
            color:var(--text-muted);
        }

        /* ---------- Footer ---------- */

        .page-footer{
            margin-top:auto;
            background:var(--cream);
            padding:30px 45px;
            border-top:1px solid var(--border-soft);
        }

        .page-footer strong{
            color:#111;
        }

    </style>

</head>

<body>

<nav class="navbar d-flex justify-content-between align-items-center">

    <a class="logo-wrap" href="{% url 'dashboard' %}">
        <img src="{% static 'images/LOGO-bgremove.png' %}"
             alt="Budget Buddy"
             height="42">
    </a>

    <div>

        <a class="btn btn-secondary me-2"
           href="{% url 'dashboard' %}">
            Dashboard
        </a>

        <a class="btn btn-secondary me-2"
           href="{% url 'roommate_list' %}">
            Roommates
        </a>

        <a class="btn btn-secondary me-2"
           href="{% url 'roommate_dashboard' %}">
            My Dashboard
        </a>

        <a class="btn btn-primary"
           href="{% url 'add_roommate' %}">
            + Add Post
        </a>

    </div>

</nav>

<main class="container page-content">

    {% block content %}
    {% endblock %}

</main>

<footer class="page-footer">

    <strong>BudgetBuddy</strong>

    <p class="text-muted mb-0">
        A centralized platform for university students to find housing and connect with roommates.
    </p>

</footer>

</body>
</html>
